name: Build and Deploy Legion K Player

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev g++-mingw-w64-x86-64

    - name: Build Linux Binary
      run: |
        make

    - name: Build Windows EXE
      run: |
        make win

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Legion-K-Player-Builds
        path: |
          Legion-K-Player-Bin
          Legion-K-Player.exe

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=legion-k-player

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Legion-K-Player-Builds

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Legion-K-Player-Bin
            Legion-K-Player.exe
          tag_name: latest
          name: Legion K Player Full Release
          body: Official build of Legion K Player Full Version by DEMO X HEXA.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
